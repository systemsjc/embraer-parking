<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JC Systems Park-Embraer</title>
    
    <!-- SDK Firebase Compat (Necessário para rodar direto no HTML) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root {
            --disponivel: #2ecc71; --ocupado: #e74c3c;
            --idoso: #3498db; --pcd: #9b59b6; --gestante: #f1c40f;
            --embraer-blue: #003399;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .header { display: flex; align-items: center; justify-content: space-between; background: white; padding: 10px 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .logo-img { height: 45px; width: auto; }
        .app-title { text-align: center; flex-grow: 1; color: var(--embraer-blue); font-size: 1rem; font-weight: bold; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 20px; border-radius: 12px; }
        .form-cadastro { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; padding: 15px; background: #f8f9fa; border-radius: 8px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .legenda { display: flex; justify-content: center; gap: 12px; margin-bottom: 15px; flex-wrap: wrap; font-size: 0.7rem; }
        .legenda div { display: flex; align-items: center; gap: 5px; }
        .box { width: 12px; height: 12px; border-radius: 2px; }
        .grid-vagas { display: grid; grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); gap: 6px; height: 55vh; overflow-y: auto; padding: 10px; border: 1px solid #eee; border-radius: 8px; }
        .vaga { height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; color: white; font-weight: bold; font-size: 0.7rem; background-color: var(--disponivel); border: 2px solid transparent; transition: 0.2s; }
        .vaga.ocupada { background-color: var(--ocupado) !important; border-color: transparent !important; }
        .vaga.idoso { border-color: var(--idoso); }
        .vaga.pcd { border-color: var(--pcd); }
        .vaga.gestante { border-color: var(--gestante); }
        .info-vaga { font-size: 0.4rem; text-transform: uppercase; margin-top: 2px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <img src="logo_jc.png" alt="JC" class="logo-img">
    <div class="app-title">JC SYSTEMS PARK-EMBRAER</div>
    <img src="logo_embraer.png" alt="Embraer" class="logo-img">
</div>

<div class="container">
    <div class="form-cadastro">
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="number" id="cracha" placeholder="Crachá (6 dígitos)" oninput="if(this.value.length > 6) this.value = this.value.slice(0,6)">
        <input type="text" id="cpf" placeholder="CPF">
        <input type="text" id="setor" placeholder="Setor">
    </div>

    <div class="legenda">
        <div><span class="box" style="background: var(--disponivel)"></span> Livre</div>
        <div><span class="box" style="background: var(--ocupado)"></span> Ocupada</div>
        <div><span class="box" style="border: 2px solid var(--idoso)"></span> Idoso</div>
        <div><span class="box" style="border: 2px solid var(--pcd)"></span> PCD</div>
        <div><span class="box" style="border: 2px solid var(--gestante)"></span> Grávida</div>
    </div>

    <div id="grid-vagas" class="grid-vagas"></div>
</div>

<script>
    // Configurações que você enviou
    const firebaseConfig = {
        apiKey: "AIzaSyBlTbk72y1HHVjvSnR5cwOvDefhsc7niCw",
        authDomain: "jc-systems-park-4f67b.firebaseapp.com",
        databaseURL: "https://jc-systems-park-4f67b-default-rtdb.firebaseio.com",
        projectId: "jc-systems-park-4f67b",
        storageBucket: "jc-systems-park-4f67b.firebasestorage.app",
        messagingSenderId: "741479720172",
        appId: "1:741479720172:web:0fe85b07955b0fedb0b1c9"
    };

    // Inicialização
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function gerarVagas() {
        const grid = document.getElementById('grid-vagas');
        const frag = document.createDocumentFragment();
        for (let i = 1; i <= 2500; i++) {
            const v = document.createElement('div');
            v.id = `v-${i}`;
            v.className = 'vaga';
            let label = "";
            if (i <= 100) { v.classList.add('idoso'); label = "Idoso"; }
            else if (i <= 200) { v.classList.add('pcd'); label = "PCD"; }
            else if (i <= 300) { v.classList.add('gestante'); label = "Grávida"; }
            v.innerHTML = `<span>${i}</span><div class="info-vaga" id="lbl-${i}">${label}</div>`;
            v.onclick = () => gerenciarVaga(i);
            frag.appendChild(v);
        }
        grid.appendChild(frag);
    }

    db.ref('vagas').on('value', (snap) => {
        const dados = snap.val() || {};
        document.querySelectorAll('.vaga.ocupada').forEach(el => el.classList.remove('ocupada'));
        for (let id in dados) {
            const el = document.getElementById(`v-${id}`);
            const lbl = document.getElementById(`lbl-${id}`);
            if (el) {
                el.classList.add('ocupada');
                lbl.innerText = dados[id].cracha;
            }
        }
    });

    function gerenciarVaga(n) {
        const ref = db.ref('vagas/' + n);
        ref.once('value', (snap) => {
            if (snap.exists()) {
                if(confirm(`Vaga ${n} ocupada. Liberar?`)) ref.remove();
            } else {
                const nome = document.getElementById('nome').value;
                const cracha = document.getElementById('cracha').value;
                if (!nome || cracha.length !== 6) {
                    alert("Preencha Nome e Crachá (6 dígitos)");
                    return;
                }
                ref.set({ nome, cracha, cpf: document.getElementById('cpf').value, setor: document.getElementById('setor').value });
            }
        });
    }

    gerarVagas();
</script>
</body>
</html>
